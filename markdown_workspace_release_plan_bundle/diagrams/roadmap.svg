<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500">
<style>.box{fill:#f5f5f5;stroke:#111;stroke-width:2;rx:12}.t{font-family:Arial,sans-serif;font-size:16px;text-anchor:middle}.title{font-family:Arial,sans-serif;font-size:28px;font-weight:bold}</style>
<text x="40" y="45" class="title">v1 Roadmap</text>
<rect x="50" y="100" width="130" height="60" class="box"/><text x="115.0" y="135" class="t">0 Product</text><line x1="180" y1="130.0" x2="210" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="210" y="100" width="130" height="60" class="box"/><text x="275.0" y="135" class="t">1 Shell</text><line x1="340" y1="130.0" x2="370" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="370" y="100" width="130" height="60" class="box"/><text x="435.0" y="135" class="t">2 File Save</text><line x1="500" y1="130.0" x2="530" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="530" y="100" width="130" height="60" class="box"/><text x="595.0" y="135" class="t">3 Editor</text><line x1="660" y1="130.0" x2="690" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="690" y="100" width="130" height="60" class="box"/><text x="755.0" y="135" class="t">4 Workspace</text><line x1="820" y1="130.0" x2="850" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="850" y="100" width="130" height="60" class="box"/><text x="915.0" y="135" class="t">5 Tabs</text><line x1="980" y1="130.0" x2="1010" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="1010" y="100" width="130" height="60" class="box"/><text x="1075.0" y="135" class="t">6 Recovery</text><line x1="1140" y1="130.0" x2="1170" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="1170" y="100" width="130" height="60" class="box"/><text x="1235.0" y="135" class="t">7 Switcher</text><line x1="1300" y1="130.0" x2="1330" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="1330" y="100" width="130" height="60" class="box"/><text x="1395.0" y="135" class="t">8 Highlight</text><line x1="1460" y1="130.0" x2="1490" y2="130.0" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/><rect x="1490" y="100" width="130" height="60" class="box"/><text x="1555.0" y="135" class="t">9 Themes</text>
